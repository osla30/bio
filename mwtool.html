            color: #7f8c8d;

            overflow-y: auto;
            padding: 0 30px 25px 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
            word-wrap: break-word;
        }
        /* 表頭黏性定位 */
        th {
            position: sticky;
            top: 0;
            background-color: #3498db;
            color: white;
            font-weight: 600;
            z-index: 5;

            box-shadow: 0 2px 2px -1px rgba(0,0,0,0.2);

        th:nth-child(3) { width: 16%; }
        th:nth-child(4) { width: 15%; }
        th:nth-child(5) { width: 16%; }

        }

            font-weight: bold;
            color: #e74c3c;
        }
        .cas-value {
            font-family: 'Courier New', Courier, monospace;
            color: #2980b9;
        }

            text-align: center;

.button-group {

}

}

                <td>${chem.formula}</td>
                <td class="mw-value">${mwDisplay}</td>
                <td class="cas-value">${chem.cas}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    // 初始載入
    renderTable(chemicalData);

    // 搜尋過濾功能
    searchInput.addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        const filteredData = chemicalData.filter(chem => 
            chem.common.toLowerCase().includes(searchTerm) || 
            chem.iupac.toLowerCase().includes(searchTerm) ||
            chem.formula.toLowerCase().includes(searchTerm) ||
            chem.cas.toLowerCase().includes(searchTerm)
        );
        renderTable(filteredData);
    });

    // 匯出 CSV 功能
    exportBtn.addEventListener('click', function() {
        // 加入 BOM (\uFEFF) 讓 Excel 支援 UTF-8 中文顯示
        let csvContent = "\uFEFF"; 
        csvContent += "常用簡稱,首選 IUPAC 名,化學式,分子量 (g/mol),CAS 編號\n";

        currentDisplayData.forEach(chem => {
            // 處理 IUPAC 名稱中可能含有的逗號 (用雙引號包覆)
            let common = `"${chem.common.replace(/"/g, '""')}"`;
            let iupac = `"${chem.iupac.replace(/"/g, '""')}"`;
            let formula = `"${chem.formula.replace(/"/g, '""')}"`;
            let cas = `"${chem.cas}"`;
            
            let mwDisplay = chem.mw;
            if (chem.common.includes("Triton") || chem.common.includes("Tween") || chem.common.includes("NP-40") || chem.common.includes("PFA")) {
                mwDisplay = `"~${chem.mw.toFixed(2)} (Avg/Monomer)"`;
            }

            csvContent += `${common},${iupac},${formula},${mwDisplay},${cas}\n`;
        });

        // 建立 Blob 與虛擬下載連結
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", "Chemical_MW_List.csv");
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
    // 下載離線版 HTML 功能
const downloadBtn = document.getElementById('downloadBtn');

downloadBtn.addEventListener('click', function() {
    // 複製一份當下的 DOM 結構樹（這在背景進行，不會影響畫面上看到的表格）
    const clonedDoc = document.documentElement.cloneNode(true);
    
    // 將複製體內的 tbody 內容清空，還原成初次載入前乾淨的狀態
    clonedDoc.querySelector('#tableBody').innerHTML = '';
    
    // 從清空後的複製體抓取 HTML 結構
    const htmlContent = "<!DOCTYPE html>\n" + clonedDoc.outerHTML;
    
    // 建立 Blob 與虛擬下載連結
    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    
    link.setAttribute("href", url);
    link.setAttribute("download", "Chemical_MW_Tool.html");
    link.style.visibility = 'hidden';
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
});
</script>
</body>
</html>
